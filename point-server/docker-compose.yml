services:
  point:
    build: .
    ports:
      - "8585:8080"
    volumes:
      - point-data:/data
    environment:
      DATABASE_URL: "sqlite:/data/point.db?mode=rwc"
      LISTEN: "0.0.0.0:8080"
      DOMAIN: "point.petalcat.dev"
      OPEN_REGISTRATION: "true"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
    restart: unless-stopped

volumes:
  point-data:
